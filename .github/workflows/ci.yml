name: Golang CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      # need checkout before using compose-action
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Verify Go toolchain
        run: |
          go version
          go env GOPATH
          ls "$(go env GOROOT)/bin/"
          export PATH="$(go env GOROOT)/bin:$(go env GOPATH)/bin:$PATH"
          which go

      - name: Start db
        uses: isbang/compose-action@v2.0.1
        with:
          down-flags: "--volumes"
          services: |
            db

      - name: Build
        run: make build

      - name: Test
        run: |
          export PATH="$(go env GOROOT)/bin:$(go env GOPATH)/bin:$PATH"
          go tool -n covdata 2>/dev/null || go install golang.org/x/tools/cmd/covdata@latest
          make test
